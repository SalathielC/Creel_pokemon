<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Pack Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3f 50%, #0d0d2b 100%);
            color: #fff;
            min-height: 100vh;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(255, 25, 25, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        header h1 {
            font-size: 3.5em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffeb3b 0%, #ffd700 25%, #ff6b35 75%, #ff1919 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            filter: drop-shadow(0 4px 15px rgba(255, 215, 0, 0.2));
            animation: glow 3s ease-in-out infinite;
        }

        header p {
            color: #bdc3c7;
            font-size: 1.15em;
            font-weight: 300;
            letter-spacing: 1px;
            animation: fadeInDelay 1.2s ease-out;
        }

        .total-counter {
            background: linear-gradient(135deg, #ff1919 0%, #ffd700 50%, #ff6b35 100%);
            padding: 50px 40px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 50px;
            box-shadow: 
                0 25px 50px rgba(255, 215, 0, 0.35),
                0 0 30px rgba(255, 25, 25, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: slideUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .total-counter::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        .total-counter h2 {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #000;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        .total-counter .number {
            font-size: 5.5em;
            font-weight: 900;
            color: #000;
            text-shadow: 
                3px 3px 0 rgba(255, 255, 255, 0.4),
                -2px -2px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 2;
            animation: countBounce 0.6s ease-out;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 50px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 1.2s ease-out;
        }

        .btn {
            padding: 15px 32px;
            border: none;
            border-radius: 12px;
            font-size: 0.95em;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #000;
            box-shadow: 
                0 10px 30px rgba(255, 215, 0, 0.4),
                0 0 20px rgba(255, 215, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 40px rgba(255, 215, 0, 0.6),
                0 0 30px rgba(255, 215, 0, 0.3);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ff1919 0%, #cc0000 100%);
            color: #fff;
            box-shadow: 
                0 10px 30px rgba(255, 25, 25, 0.4),
                0 0 20px rgba(255, 25, 25, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 40px rgba(255, 25, 25, 0.6),
                0 0 30px rgba(255, 25, 25, 0.3);
            filter: brightness(1.15);
        }

        .sets-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .set-card {
            background: linear-gradient(135deg, #1e1e3f 0%, #2d2d5f 100%);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.4),
                0 0 20px rgba(255, 215, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: fadeInUp 0.7s ease-out;
            position: relative;
            overflow: hidden;
        }

        .set-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .set-card:hover::before {
            left: 100%;
        }

        .set-card:hover {
            transform: translateY(-8px);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(255, 215, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 215, 0, 0.3);
        }

        .set-name {
            font-size: 1.6em;
            font-weight: 800;
            margin-bottom: 20px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .set-count {
            font-size: 4.5em;
            font-weight: 900;
            text-align: center;
            margin: 30px 0;
            color: #fff;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 105, 53, 0.1) 100%);
            padding: 30px;
            border-radius: 15px;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .set-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            position: relative;
            z-index: 1;
        }

        .btn-increment,
        .btn-decrement,
        .btn-delete {
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.3em;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-increment,
        .btn-decrement {
            flex: 1;
            padding: 15px;
            color: #fff;
        }

        .btn-increment {
            background: linear-gradient(135deg, #04d361 0%, #00c94f 100%);
            box-shadow: 0 8px 20px rgba(4, 211, 97, 0.3);
        }

        .btn-increment:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 30px rgba(4, 211, 97, 0.5);
            filter: brightness(1.15);
        }

        .btn-decrement {
            background: linear-gradient(135deg, #ff1919 0%, #cc0000 100%);
            box-shadow: 0 8px 20px rgba(255, 25, 25, 0.3);
        }

        .btn-decrement:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 30px rgba(255, 25, 25, 0.5);
            filter: brightness(1.15);
        }

        .btn-delete {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: #fff;
            padding: 10px 16px;
            font-size: 0.95em;
            flex: 0.6;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }

        .btn-delete:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.5);
            filter: brightness(1.15);
        }

        .set-actions-secondary {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 1.2s ease-out;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            background: linear-gradient(135deg, #1e1e3f 0%, #2d2d5f 100%);
            color: #fff;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 215, 0, 0.4);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #ffd700;
            background: linear-gradient(135deg, #2d2d5f 0%, #3d3d7f 100%);
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #7a8a99;
            grid-column: 1 / -1;
        }

        .empty-state p {
            font-size: 1.3em;
            margin-bottom: 20px;
            font-weight: 300;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDelay {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 4px 15px rgba(255, 215, 0, 0.2));
            }
            50% {
                filter: drop-shadow(0 4px 25px rgba(255, 215, 0, 0.4));
            }
        }

        @keyframes shimmer {
            0% {
                left: -100%;
            }
            100% {
                left: 100%;
            }
        }

        @keyframes countBounce {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.3em;
                letter-spacing: 2px;
            }

            .total-counter {
                padding: 35px 30px;
                margin-bottom: 35px;
            }

            .total-counter .number {
                font-size: 3.8em;
            }

            .sets-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .input-group {
                flex-direction: column;
            }

            .set-card {
                padding: 25px;
            }

            .set-count {
                font-size: 3.5em;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔴 Pokémon Pack Counter 🔴</h1>
            <p style="color: #ffd700; font-size: 1.1em;">Track your pack openings</p>
        </header>

        <div class="total-counter">
            <h2>Total Packs Opened</h2>
            <div class="number" id="totalCount">0</div>
        </div>

        <div class="controls">
            <div class="input-group">
                <input 
                    type="text" 
                    id="setName" 
                    placeholder="Enter set name (e.g., Scarlet & Violet, Base Set)"
                    autocomplete="off"
                >
                <button class="btn btn-primary" onclick="addSet()">+ Add Set</button>
            </div>
            <button class="btn btn-secondary" onclick="resetAll()">Reset All</button>
        </div>

        <div class="sets-container" id="setsContainer">
            <div class="empty-state">
                <p>🎁 No sets yet! Add your first set to get started.</p>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'pokemonSets';

        // Load sets from localStorage
        function loadSets() {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : {};
        }

        // Save sets to localStorage
        function saveSets(sets) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sets));
        }

        // Render all sets
        function render() {
            const sets = loadSets();
            const container = document.getElementById('setsContainer');
            
            // Update total
            const total = Object.values(sets).reduce((sum, count) => sum + count, 0);
            document.getElementById('totalCount').textContent = total;

            // Clear container
            container.innerHTML = '';

            // Check if empty
            if (Object.keys(sets).length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>🎁 No sets yet! Add your first set to get started.</p></div>';
                return;
            }

            // Render each set
            Object.entries(sets).forEach(([setName, count]) => {
                const card = document.createElement('div');
                card.className = 'set-card';
                card.innerHTML = `
                    <div class="set-name">${setName}</div>
                    <div class="set-count">${count}</div>
                    <div class="set-actions">
                        <button class="btn-increment" onclick="incrementSet('${setName}')">➕</button>
                        <button class="btn-decrement" onclick="decrementSet('${setName}')">➖</button>
                    </div>
                    <div class="set-actions-secondary">
                        <button class="btn-delete" onclick="deleteSet('${setName}')">Remove Set</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Add a new set
        function addSet() {
            const input = document.getElementById('setName');
            const name = input.value.trim();

            if (!name) {
                alert('Please enter a set name');
                return;
            }

            const sets = loadSets();
            if (sets[name] !== undefined) {
                alert('This set already exists!');
                return;
            }

            sets[name] = 0;
            saveSets(sets);
            input.value = '';
            render();
        }

        // Increment pack count for a set
        function incrementSet(setName) {
            const sets = loadSets();
            if (sets[setName] !== undefined) {
                sets[setName]++;
                saveSets(sets);
                render();
            }
        }

        // Decrement pack count for a set
        function decrementSet(setName) {
            const sets = loadSets();
            if (sets[setName] !== undefined && sets[setName] > 0) {
                sets[setName]--;
                saveSets(sets);
                render();
            }
        }

        // Delete a set
        function deleteSet(setName) {
            if (confirm(`Delete "${setName}" and all its data?`)) {
                const sets = loadSets();
                delete sets[setName];
                saveSets(sets);
                render();
            }
        }

        // Reset all sets to 0
        function resetAll() {
            if (confirm('Reset all pack counts to 0?')) {
                Object.keys(loadSets()).forEach(setName => {
                    const sets = loadSets();
                    sets[setName] = 0;
                    saveSets(sets);
                });
                render();
            }
        }

        // Allow Enter key to add set
        document.getElementById('setName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addSet();
        });

        // Initial render
        render();
    </script>
</body>
</html>
