<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Pack Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3f 50%, #0d0d2b 100%);
            color: #fff;
            min-height: 100vh;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(255, 25, 25, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .header-icons {
            display: flex;
            justify-content: center;
            gap: 40px;
            align-items: center;
            margin-bottom: 30px;
            animation: fadeIn 1s ease-out;
        }

        .pokeball-icon {
            width: 60px;
            height: 60px;
            animation: spin 4s linear infinite;
            opacity: 0.9;
        }

        .pikachu-icon {
            width: 70px;
            height: 70px;
            filter: drop-shadow(0 4px 15px rgba(255, 215, 0, 0.4));
            animation: bounce 2s ease-in-out infinite;
            opacity: 0.95;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        header h1 {
            font-size: 3.5em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffeb3b 0%, #ffd700 25%, #ff6b35 75%, #ff1919 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            filter: drop-shadow(0 4px 15px rgba(255, 215, 0, 0.2));
            animation: glow 3s ease-in-out infinite;
        }

        header p {
            color: #bdc3c7;
            font-size: 1.15em;
            font-weight: 300;
            letter-spacing: 1px;
            animation: fadeInDelay 1.2s ease-out;
        }

        .total-counter {
            background: linear-gradient(135deg, #ff1919 0%, #ffd700 50%, #ff6b35 100%);
            padding: 50px 40px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 50px;
            box-shadow: 
                0 25px 50px rgba(255, 215, 0, 0.35),
                0 0 30px rgba(255, 25, 25, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: slideUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .total-counter::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        .total-counter h2 {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #000;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        .total-counter .number {
            font-size: 5.5em;
            font-weight: 900;
            color: #000;
            text-shadow: 
                3px 3px 0 rgba(255, 255, 255, 0.4),
                -2px -2px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 2;
            animation: countBounce 0.6s ease-out;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 50px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 1.2s ease-out;
        }

        .btn {
            padding: 15px 32px;
            border: none;
            border-radius: 12px;
            font-size: 0.95em;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #000;
            box-shadow: 
                0 10px 30px rgba(255, 215, 0, 0.4),
                0 0 20px rgba(255, 215, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 40px rgba(255, 215, 0, 0.6),
                0 0 30px rgba(255, 215, 0, 0.3);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ff1919 0%, #cc0000 100%);
            color: #fff;
            box-shadow: 
                0 10px 30px rgba(255, 25, 25, 0.4),
                0 0 20px rgba(255, 25, 25, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 40px rgba(255, 25, 25, 0.6),
                0 0 30px rgba(255, 25, 25, 0.3);
            filter: brightness(1.15);
        }

        .sets-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .set-card {
            background: linear-gradient(135deg, #1e1e3f 0%, #2d2d5f 100%);
            border-radius: 20px;
            padding: 18px;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.4),
                0 0 20px rgba(255, 215, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .set-card.new {
            animation: fadeInUp 0.7s ease-out;
        }

        .set-card.pulse {
            animation: cardPulse 0.3s ease-out;
        }

        .set-count.counting {
            animation: countBounce 0.4s ease-out;
        }

        .set-card:hover {
            transform: translateY(-8px);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(255, 215, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 215, 0, 0.3);
        }

        .set-image-container {
            width: 100%;
            height: 130px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .set-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .set-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 105, 53, 0.1) 100%);
            font-size: 3em;
        }

        .set-name {
            font-size: 1.3em;
            font-weight: 800;
            margin-bottom: 10px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .set-count {
            font-size: 3.2em;
            font-weight: 900;
            text-align: center;
            margin: 12px 0;
            color: #fff;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 105, 53, 0.1) 100%);
            padding: 15px;
            border-radius: 12px;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .set-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            position: relative;
            z-index: 1;
        }

        .btn-increment,
        .btn-decrement,
        .btn-delete {
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1em;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-increment,
        .btn-decrement {
            flex: 1;
            padding: 10px;
            color: #fff;
        }

        .btn-increment {
            background: linear-gradient(135deg, #04d361 0%, #00c94f 100%);
            box-shadow: 0 8px 20px rgba(4, 211, 97, 0.3);
        }

        .btn-increment:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 30px rgba(4, 211, 97, 0.5);
            filter: brightness(1.15);
        }

        .btn-decrement {
            background: linear-gradient(135deg, #ff1919 0%, #cc0000 100%);
            box-shadow: 0 8px 20px rgba(255, 25, 25, 0.3);
        }

        .btn-decrement:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 30px rgba(255, 25, 25, 0.5);
            filter: brightness(1.15);
        }

        .btn-delete {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: #fff;
            padding: 8px 10px;
            font-size: 0.8em;
            flex: 0.5;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }

        .btn-delete:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.5);
            filter: brightness(1.15);
        }

        .set-actions-secondary {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 1.2s ease-out;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            background: linear-gradient(135deg, #1e1e3f 0%, #2d2d5f 100%);
            color: #fff;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 215, 0, 0.4);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #ffd700;
            background: linear-gradient(135deg, #2d2d5f 0%, #3d3d7f 100%);
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1e1e3f 0%, #2d2d5f 100%);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .suggestions-dropdown.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 16px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: rgba(255, 215, 0, 0.15);
            padding-left: 20px;
        }

        .suggestion-item img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 4px;
        }

        .suggestion-text {
            flex: 1;
        }

        .suggestion-code {
            color: rgba(255, 215, 0, 0.6);
            font-size: 0.85em;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #7a8a99;
            grid-column: 1 / -1;
        }

        .empty-state p {
            font-size: 1.3em;
            margin-bottom: 20px;
            font-weight: 300;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDelay {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 4px 15px rgba(255, 215, 0, 0.2));
            }
            50% {
                filter: drop-shadow(0 4px 25px rgba(255, 215, 0, 0.4));
            }
        }

        @keyframes shimmer {
            0% {
                left: -100%;
            }
            100% {
                left: 100%;
            }
        }

        @keyframes countBounce {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes cardPulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
            100% {
                transform: scale(1);
            }
        }

        .set-card.updating {
            animation: cardPulse 0.4s ease-out !important;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.3em;
                letter-spacing: 2px;
            }

            header p {
                font-size: 1em;
            }

            .total-counter {
                padding: 35px 30px;
                margin-bottom: 35px;
            }

            .total-counter .number {
                font-size: 3.8em;
            }

            .total-counter h2 {
                font-size: 1em;
            }

            .sets-container {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .input-group {
                flex-direction: column;
                gap: 8px;
            }

            .set-card {
                padding: 15px;
            }

            .set-count {
                font-size: 2.8em;
                padding: 12px;
                margin: 10px 0;
            }

            .set-image-container {
                height: 110px;
                margin-bottom: 10px;
            }

            .set-image-placeholder {
                font-size: 2em;
            }

            .set-name {
                font-size: 1.1em;
                margin-bottom: 8px;
            }

            .btn-increment,
            .btn-decrement {
                padding: 10px;
                font-size: 1em;
            }

            .btn-delete {
                padding: 8px 8px;
                font-size: 0.75em;
            }

            .set-actions {
                gap: 6px;
                margin-top: 10px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 0.9em;
                letter-spacing: 1px;
            }

            .controls {
                flex-direction: column;
                gap: 10px;
            }

            input[type="text"] {
                padding: 14px 16px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.8em;
                letter-spacing: 1px;
                margin-bottom: 5px;
            }

            header p {
                font-size: 0.95em;
            }

            .total-counter {
                padding: 25px 20px;
                margin-bottom: 25px;
            }

            .total-counter h2 {
                font-size: 0.9em;
                margin-bottom: 8px;
            }

            .total-counter .number {
                font-size: 2.5em;
            }

            .container {
                padding: 10px;
            }

            body {
                padding: 15px 10px;
            }

            .set-card {
                padding: 12px;
                border-radius: 15px;
            }

            .set-name {
                font-size: 0.95em;
                margin-bottom: 8px;
            }

            .set-count {
                font-size: 2.3em;
                padding: 10px;
                margin: 8px 0;
            }

            .set-image-container {
                height: 100px;
                margin-bottom: 8px;
            }

            .set-actions {
                gap: 5px;
                margin-top: 8px;
            }

            .btn-increment,
            .btn-decrement {
                padding: 8px;
                font-size: 0.95em;
            }

            .set-actions-secondary {
                margin-top: 8px;
            }

            .btn-delete {
                padding: 7px 8px;
                font-size: 0.7em;
                flex: 1;
            }

            .btn {
                padding: 10px 16px;
                font-size: 0.85em;
            }

            input[type="text"] {
                padding: 12px 14px;
                font-size: 16px;
                border-radius: 10px;
            }

            .suggestion-item {
                padding: 10px 12px;
            }

            .suggestion-item img {
                width: 35px;
                height: 35px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-icons">
                <svg class="pokeball-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- Top half (red) -->
                    <path d="M 50 10 A 40 40 0 0 1 50 30 L 50 50 Z" fill="#FF1919" stroke="#FFF" stroke-width="2"/>
                    <!-- Bottom half (white) -->
                    <path d="M 50 50 L 50 70 A 40 40 0 0 1 50 90 A 40 40 0 0 1 50 70 Z" fill="#FFF" stroke="#FFF" stroke-width="2"/>
                    <!-- Center circle (black) -->
                    <circle cx="50" cy="50" r="12" fill="#000" stroke="#FFF" stroke-width="2"/>
                    <!-- Left semicircle outline -->
                    <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#FFF" stroke-width="2"/>
                </svg>

                <img class="pikachu-icon" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt="Pikachu 30th Anniversary" onerror="this.style.display='none'">
            </div>
            
            <h1>🔴 Pokémon Pack Counter 🔴</h1>
            <p style="color: #ffd700; font-size: 1.1em;">Track your pack openings</p>
        </header>

        <div class="total-counter">
            <h2>Total Packs Opened</h2>
            <div class="number" id="totalCount">0</div>
        </div>

        <div class="controls">
            <div class="input-group">
                <div style="flex: 1; position: relative;">
                    <input 
                        type="text" 
                        id="setName" 
                        placeholder="Search sets (e.g., Scarlet, Base Set)"
                        autocomplete="off"
                        oninput="searchSets()"
                    >
                    <div id="suggestionsDropdown" class="suggestions-dropdown"></div>
                </div>
                <button class="btn btn-primary" onclick="addSet()" style="flex: 0 0 auto;">+ Add</button>
            </div>
            <button class="btn btn-secondary" onclick="resetAll()">Reset All</button>
        </div>

        <div class="sets-container" id="setsContainer">
            <div class="empty-state">
                <p>🎁 No sets yet! Add your first set to get started.</p>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'pokemonSets';
        const TCG_API = 'https://api.pokemontcg.io/v2/sets';
        let allSets = [];
        let debounceTimer;

        // Validate image URL
        function isValidImageUrl(url) {
            if (!url || typeof url !== 'string') return false;
            return url.startsWith('http');
        }

        // Fetch all Pokemon sets from TCG API
        async function fetchPokemons() {
            try {
                const response = await fetch(TCG_API);
                const data = await response.json();
                // Filter only valid sets with images
                allSets = (data.data || []).filter(set => 
                    set.images && 
                    set.images.logo && 
                    isValidImageUrl(set.images.logo) &&
                    set.name && 
                    set.printedTotal !== undefined
                );
            } catch (error) {
                console.log('TCG API unavailable, using local mode');
                allSets = [];
            }
        }

        // Search for sets as user types
        function searchSets() {
            clearTimeout(debounceTimer);
            const query = document.getElementById('setName').value.toLowerCase().trim();
            const dropdown = document.getElementById('suggestionsDropdown');

            if (!query || query.length < 2) {
                dropdown.classList.remove('active');
                return;
            }

            // Filter sets - only match if set name starts with the query (more strict)
            const filtered = allSets.filter(set => {
                const name = set.name.toLowerCase();
                const series = (set.series || '').toLowerCase();
                
                return (name.startsWith(query) || series.startsWith(query)) &&
                       set.images && 
                       set.images.logo &&
                       isValidImageUrl(set.images.logo);
            }).slice(0, 8); // Show top 8 results

            if (filtered.length === 0) {
                dropdown.classList.remove('active');
                return;
            }

            // Render suggestions
            dropdown.innerHTML = filtered.map(set => `
                <div class="suggestion-item" onclick="selectSet('${set.name.replace(/'/g, "\\'")}', '${set.images.logo.replace(/'/g, "\\'")}')">
                    <img src="${set.images.logo}" alt="${set.name}" onerror="this.style.display='none'" style="display: block;">
                    <div class="suggestion-text">
                        <div>${set.name}</div>
                        <div class="suggestion-code">${set.id} • ${set.total} cards</div>
                    </div>
                </div>
            `).join('');

            dropdown.classList.add('active');
        }

        // Select a set from suggestions
        function selectSet(name, logoUrl) {
            document.getElementById('setName').value = name;
            document.getElementById('suggestionsDropdown').classList.remove('active');
            
            // Store the logo URL for this set
            const sets = loadSets();
            if (!sets[name]) {
                sets[name] = { count: 0, image: logoUrl };
                saveSets(sets);
                render();
            }
        }

        // Load sets from localStorage
        function loadSets() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) return {};
            
            const parsed = JSON.parse(saved);
            // Handle both old format (number) and new format (object)
            const converted = {};
            Object.entries(parsed).forEach(([name, value]) => {
                if (typeof value === 'number') {
                    converted[name] = { count: value, image: null };
                } else {
                    converted[name] = value;
                }
            });
            return converted;
        }

        // Save sets to localStorage
        function saveSets(sets) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sets));
        }

        // Render all sets
        function render() {
            const sets = loadSets();
            const container = document.getElementById('setsContainer');
            
            // Update total
            const total = Object.values(sets).reduce((sum, item) => sum + (item.count || 0), 0);
            document.getElementById('totalCount').textContent = total;

            // Clear container
            container.innerHTML = '';

            // Check if empty
            if (Object.keys(sets).length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>🎁 No sets yet! Search and add your first set to get started.</p></div>';
                return;
            }

            // Render each set
            Object.entries(sets).forEach(([setName, setData]) => {
                const count = setData.count || 0;
                const image = setData.image;
                
                const card = document.createElement('div');
                card.className = 'set-card new';
                card.dataset.setName = setName;
                
                let imageHTML = `<div class="set-image-placeholder">🎴</div>`;
                
                if (image) {
                    imageHTML = `<img src="${image}" alt="${setName}" class="set-image" onerror="this.parentElement.innerHTML='<div class=\\'set-image-placeholder\\'>🎴</div>'">`;
                }
                
                card.innerHTML = `
                    <div class="set-image-container">${imageHTML}</div>
                    <div class="set-name">${setName}</div>
                    <div class="set-count">${count}</div>
                    <div class="set-actions">
                        <button class="btn-increment" onclick="incrementSet('${setName.replace(/'/g, "\\'")}')">➕</button>
                        <button class="btn-decrement" onclick="decrementSet('${setName.replace(/'/g, "\\'")}')">➖</button>
                    </div>
                    <div class="set-actions-secondary">
                        <button class="btn-delete" onclick="deleteSet('${setName.replace(/'/g, "\\'")}')">Remove Set</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Add a new set
        function addSet() {
            const input = document.getElementById('setName');
            const name = input.value.trim();

            if (!name) {
                alert('Please enter or select a set name');
                return;
            }

            const sets = loadSets();
            if (sets[name] !== undefined) {
                alert('This set already exists!');
                return;
            }

            // Find matching set from API for image
            const matchedSet = allSets.find(s => s.name.toLowerCase() === name.toLowerCase());
            const image = matchedSet?.images?.logo || null;

            sets[name] = { count: 0, image: image };
            saveSets(sets);
            input.value = '';
            document.getElementById('suggestionsDropdown').classList.remove('active');
            render();
        }

        // Increment pack count for a set
        function incrementSet(setName) {
            const sets = loadSets();
            if (sets[setName] !== undefined) {
                // Update count
                sets[setName].count = (sets[setName].count || 0) + 1;
                saveSets(sets);
                
                // Find the card element
                const card = document.querySelector(`[data-set-name="${setName}"]`);
                if (card) {
                    // Update total count
                    const total = Object.values(sets).reduce((sum, item) => sum + (item.count || 0), 0);
                    document.getElementById('totalCount').textContent = total;
                    
                    // Update the count display
                    const countElement = card.querySelector('.set-count');
                    countElement.textContent = sets[setName].count;
                    
                    // Trigger smooth animation (only count, no full card)
                    countElement.classList.remove('counting');
                    void countElement.offsetWidth; // Force reflow to restart animation
                    countElement.classList.add('counting');
                    
                    // Card pulse
                    card.classList.remove('pulse');
                    void card.offsetWidth;
                    card.classList.add('pulse');
                } else {
                    // Card not found, do full render
                    render();
                }
            }
        }

        // Decrement pack count for a set
        function decrementSet(setName) {
            const sets = loadSets();
            if (sets[setName] !== undefined && (sets[setName].count || 0) > 0) {
                sets[setName].count--;
                saveSets(sets);
                
                // Find the card element
                const card = document.querySelector(`[data-set-name="${setName}"]`);
                if (card) {
                    // Update total count
                    const total = Object.values(sets).reduce((sum, item) => sum + (item.count || 0), 0);
                    document.getElementById('totalCount').textContent = total;
                    
                    // Update the count display
                    const countElement = card.querySelector('.set-count');
                    countElement.textContent = sets[setName].count;
                    
                    // Trigger animation
                    countElement.classList.remove('counting');
                    void countElement.offsetWidth;
                    countElement.classList.add('counting');
                    
                    // Card pulse
                    card.classList.remove('pulse');
                    void card.offsetWidth;
                    card.classList.add('pulse');
                } else {
                    render();
                }
            }
        }

        // Delete a set
        function deleteSet(setName) {
            if (confirm(`Delete "${setName}" and all its data?`)) {
                const sets = loadSets();
                delete sets[setName];
                saveSets(sets);
                render();
            }
        }

        // Reset all sets to 0
        function resetAll() {
            if (confirm('Reset all pack counts to 0?')) {
                const sets = loadSets();
                Object.keys(sets).forEach(setName => {
                    sets[setName].count = 0;
                });
                saveSets(sets);
                render();
            }
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (e.target.id !== 'setName') {
                document.getElementById('suggestionsDropdown').classList.remove('active');
            }
        });

        // Allow Enter key to add set
        document.getElementById('setName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addSet();
        });

        // Initialize
        fetchPokemons().then(() => render());
    </script>
</body>
</html>
