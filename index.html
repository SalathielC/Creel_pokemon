<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Pack Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(255, 25, 25, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        header h1 {
            font-size: 3.5em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffeb3b 0%, #ffd700 25%, #ff6b35 75%, #ff1919 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            filter: drop-shadow(0 4px 15px rgba(255, 215, 0, 0.2));
            animation: glow 3s ease-in-out infinite;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.15em;
            font-weight: 300;
            letter-spacing: 1px;
            animation: fadeInDelay 1.2s ease-out;
        }

        .total-counter {
            background: linear-gradient(135deg, var(--danger-color) 0%, var(--primary-color) 50%, var(--secondary-color) 100%);
            padding: 50px 40px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 50px;
            box-shadow: 
                0 25px 50px var(--card-glow),
                0 0 30px var(--accent-glow),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: slideUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .total-counter::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        .total-counter h2 {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #000;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        .total-counter .number {
            font-size: 5.5em;
            font-weight: 900;
            color: #000;
            text-shadow: 
                3px 3px 0 rgba(255, 255, 255, 0.4),
                -2px -2px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 2;
            animation: countBounce 0.6s ease-out;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 50px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 1.2s ease-out;
        }

        .controls-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 15px 32px;
            border: none;
            border-radius: 12px;
            font-size: 0.95em;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #000;
            box-shadow: 
                0 10px 30px rgba(255, 215, 0, 0.4),
                0 0 20px rgba(255, 215, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 40px rgba(255, 215, 0, 0.6),
                0 0 30px rgba(255, 215, 0, 0.3);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ff1919 0%, #cc0000 100%);
            color: #fff;
            box-shadow: 
                0 10px 30px rgba(255, 25, 25, 0.4),
                0 0 20px rgba(255, 25, 25, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 40px rgba(255, 25, 25, 0.6),
                0 0 30px rgba(255, 25, 25, 0.3);
            filter: brightness(1.15);
        }

        .sets-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .set-card {
            background: linear-gradient(135deg, #1e1e3f 0%, #2d2d5f 100%);
            border-radius: 20px;
            padding: 18px;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.4),
                0 0 20px rgba(255, 215, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .set-card.new {
            animation: fadeInUp 0.7s ease-out;
        }

        .set-card.pulse {
            animation: cardPulse 0.3s ease-out;
        }

        .set-count.counting {
            animation: countBounce 0.4s ease-out;
        }

        .set-card:hover {
            transform: translateY(-8px);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 40px var(--card-glow),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            border-color: var(--primary-color);
        }

        .set-image-container {
            width: 100%;
            height: 130px;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .set-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .set-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            opacity: 0.25;
            font-size: 3em;
        }

        .set-name {
            font-size: 1.3em;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .set-count {
            font-size: 3.2em;
            font-weight: 900;
            text-align: center;
            margin: 12px 0;
            color: #fff;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(255, 105, 53, 0.1) 100%);
            padding: 15px;
            border-radius: 12px;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .set-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            position: relative;
            z-index: 1;
        }

        .btn-increment,
        .btn-decrement,
        .btn-delete {
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1em;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-increment,
        .btn-decrement {
            flex: 1;
            padding: 10px;
            color: #fff;
        }

        .btn-increment {
            background: linear-gradient(135deg, #04d361 0%, #00c94f 100%);
            box-shadow: 0 8px 20px rgba(4, 211, 97, 0.3);
        }

        .btn-increment:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 30px rgba(4, 211, 97, 0.5);
            filter: brightness(1.15);
        }

        .btn-decrement {
            background: linear-gradient(135deg, #ff1919 0%, #cc0000 100%);
            box-shadow: 0 8px 20px rgba(255, 25, 25, 0.3);
        }

        .btn-decrement:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 30px rgba(255, 25, 25, 0.5);
            filter: brightness(1.15);
        }

        .btn-delete {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: #fff;
            padding: 8px 10px;
            font-size: 0.8em;
            flex: 0.5;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }

        .btn-delete:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.5);
            filter: brightness(1.15);
        }

        .set-actions-secondary {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 1.2s ease-out;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]::placeholder {
            color: var(--primary-color);
            opacity: 0.6;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background: var(--bg-secondary);
            box-shadow: 
                0 0 20px var(--card-glow),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 2px solid var(--primary-color);
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .suggestions-dropdown.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 16px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid var(--primary-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: var(--primary-color);
            padding-left: 20px;
        }

        .suggestion-item img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 4px;
        }

        .suggestion-text {
            flex: 1;
        }

        .suggestion-code {
            color: rgba(255, 215, 0, 0.6);
            font-size: 0.85em;
        }

        /* Leaderboard Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.3s ease-out;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 25px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            border: 2px solid var(--primary-color);
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            color: var(--primary-color);
            font-size: 1.8em;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 2em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            color: var(--secondary-color);
            transform: scale(1.2);
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .leaderboard-item {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .leaderboard-item:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 105, 53, 0.15) 100%);
            border-color: rgba(255, 215, 0, 0.4);
            transform: translateX(5px);
        }

        .leaderboard-rank {
            font-size: 1.5em;
            font-weight: 900;
            min-width: 40px;
            text-align: center;
        }

        .leaderboard-rank.first {
            color: #ffd700;
        }

        .leaderboard-rank.second {
            color: #c0c0c0;
        }

        .leaderboard-rank.third {
            color: #cd7f32;
        }

        .leaderboard-info {
            flex: 1;
        }

        .leaderboard-name {
            font-size: 1.1em;
            font-weight: 700;
            color: #fff;
        }

        .leaderboard-count {
            font-size: 0.9em;
            color: rgba(255, 215, 0, 0.8);
        }

        .leaderboard-packs {
            font-size: 1.8em;
            font-weight: 900;
            color: #ffd700;
            text-align: right;
        }

        .add-friend-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .add-friend-form input {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 10px;
            background: rgba(255, 215, 0, 0.05);
            color: #fff;
            font-size: 1em;
        }

        .add-friend-form input::placeholder {
            color: rgba(255, 215, 0, 0.4);
        }

        .add-friend-form input:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }

        .share-stats-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .share-stats-form input {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 10px;
            background: rgba(255, 215, 0, 0.05);
            color: #fff;
            font-size: 0.95em;
            word-break: break-all;
        }

        .copy-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #04d361 0%, #00c94f 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(4, 211, 97, 0.4);
        }

        .empty-leaderboard {
            text-align: center;
            padding: 30px 20px;
            color: rgba(255, 215, 0, 0.6);
        }

        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.1);
        }

        .modal-tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: rgba(255, 215, 0, 0.6);
            font-weight: 700;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .modal-tab-btn.active {
            color: #ffd700;
            border-bottom-color: #ffd700;
        }

        .modal-tab {
            display: none;
        }

        .modal-tab.active {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #7a8a99;
            grid-column: 1 / -1;
        }

        .empty-state p {
            font-size: 1.3em;
            margin-bottom: 20px;
            font-weight: 300;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDelay {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 4px 15px rgba(255, 215, 0, 0.2));
            }
            50% {
                filter: drop-shadow(0 4px 25px rgba(255, 215, 0, 0.4));
            }
        }

        @keyframes shimmer {
            0% {
                left: -100%;
            }
            100% {
                left: 100%;
            }
        }

        @keyframes countBounce {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes cardPulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.3em;
                letter-spacing: 2px;
            }

            header p {
                font-size: 1em;
            }

            .total-counter {
                padding: 35px 30px;
                margin-bottom: 35px;
            }

            .total-counter .number {
                font-size: 3.8em;
            }

            .total-counter h2 {
                font-size: 1em;
            }

            .sets-container {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .input-group {
                flex-direction: column;
                gap: 8px;
            }

            .set-card {
                padding: 15px;
            }

            .set-count {
                font-size: 2.8em;
                padding: 12px;
                margin: 10px 0;
            }

            .set-image-container {
                height: 110px;
                margin-bottom: 10px;
            }

            .set-image-placeholder {
                font-size: 2em;
            }

            .set-name {
                font-size: 1.1em;
                margin-bottom: 8px;
            }

            .btn-increment,
            .btn-decrement {
                padding: 10px;
                font-size: 1em;
            }

            .btn-delete {
                padding: 8px 8px;
                font-size: 0.75em;
            }

            .set-actions {
                gap: 6px;
                margin-top: 10px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 0.9em;
                letter-spacing: 1px;
            }

            .controls {
                flex-direction: column;
                gap: 10px;
            }

            input[type="text"] {
                padding: 14px 16px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.8em;
                letter-spacing: 1px;
                margin-bottom: 5px;
            }

            header p {
                font-size: 0.95em;
            }

            .total-counter {
                padding: 25px 20px;
                margin-bottom: 25px;
            }

            .total-counter h2 {
                font-size: 0.9em;
                margin-bottom: 8px;
            }

            .total-counter .number {
                font-size: 2.5em;
            }

            .container {
                padding: 10px;
            }

            body {
                padding: 15px 10px;
            }

            .set-card {
                padding: 12px;
                border-radius: 15px;
            }

            .set-name {
                font-size: 0.95em;
                margin-bottom: 8px;
            }

            .set-count {
                font-size: 2.3em;
                padding: 10px;
                margin: 8px 0;
            }

            .set-image-container {
                height: 100px;
                margin-bottom: 8px;
            }

            .set-actions {
                gap: 5px;
                margin-top: 8px;
            }

            .btn-increment,
            .btn-decrement {
                padding: 8px;
                font-size: 0.95em;
            }

            .set-actions-secondary {
                margin-top: 8px;
            }

            .btn-delete {
                padding: 7px 8px;
                font-size: 0.7em;
                flex: 1;
            }

            .btn {
                padding: 10px 16px;
                font-size: 0.85em;
            }

            input[type="text"] {
                padding: 12px 14px;
                font-size: 16px;
                border-radius: 10px;
            }

            .suggestion-item {
                padding: 10px 12px;
            }

            .suggestion-item img {
                width: 35px;
                height: 35px;
            }
        }

        /* ============ THEME SYSTEM ============ */
        :root {
            --primary-color: #ffd700;
            --secondary-color: #ff6b35;
            --danger-color: #ff1919;
            --bg-primary: linear-gradient(135deg, #0f0f1e 0%, #1a1a3f 50%, #0d0d2b 100%);
            --bg-secondary: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #bdc3c7;
            --card-glow: rgba(255, 215, 0, 0.35);
            --accent-glow: rgba(255, 25, 25, 0.25);
        }

        /* Dark Theme (Default) */
        body.theme-dark {
            --primary-color: #ffd700;
            --secondary-color: #ff6b35;
            --danger-color: #ff1919;
            --bg-primary: linear-gradient(135deg, #0f0f1e 0%, #1a1a3f 50%, #0d0d2b 100%);
            --bg-secondary: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #bdc3c7;
            --card-glow: rgba(255, 215, 0, 0.35);
            --accent-glow: rgba(255, 25, 25, 0.25);
        }

        /* Retro 8-bit Theme */
        body.theme-retro-8bit {
            --primary-color: #ff00ff;
            --secondary-color: #00ffff;
            --danger-color: #ffff00;
            --bg-primary: linear-gradient(135deg, #2d1b69 0%, #3d2e7a 50%, #1a0f33 100%);
            --bg-secondary: rgba(255, 0, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #00ffff;
            --card-glow: rgba(255, 0, 255, 0.3);
            --accent-glow: rgba(0, 255, 255, 0.2);
        }

        /* Neon Cyber Theme */
        body.theme-neon-cyber {
            --primary-color: #00ff00;
            --secondary-color: #ff00ff;
            --danger-color: #00ffff;
            --bg-primary: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0f000f 100%);
            --bg-secondary: rgba(0, 255, 0, 0.06);
            --text-primary: #00ff00;
            --text-secondary: #00ff88;
            --card-glow: rgba(0, 255, 0, 0.3);
            --accent-glow: rgba(255, 0, 255, 0.2);
        }

        /* Gold/Silver Theme (Gen II) */
        body.theme-gold-silver {
            --primary-color: #ffd700;
            --secondary-color: #c0c0c0;
            --danger-color: #ff6b00;
            --bg-primary: linear-gradient(135deg, #2a2416 0%, #3d3528 50%, #1f1915 100%);
            --bg-secondary: rgba(255, 215, 0, 0.08);
            --text-primary: #fdf5e6;
            --text-secondary: #c0c0c0;
            --card-glow: rgba(255, 215, 0, 0.4);
            --accent-glow: rgba(192, 192, 192, 0.25);
        }

        /* Pastel Nature Theme */
        body.theme-pastel-nature {
            --primary-color: #85e7c9;
            --secondary-color: #ffa6c1;
            --danger-color: #ff9d88;
            --bg-primary: linear-gradient(135deg, #f3e5f5 0%, #e8f5e9 50%, #fff3e0 100%);
            --bg-secondary: rgba(133, 231, 201, 0.1);
            --text-primary: #37474f;
            --text-secondary: #546e7a;
            --card-glow: rgba(133, 231, 201, 0.3);
            --accent-glow: rgba(255, 166, 193, 0.2);
        }

        /* Classic Light Theme */
        body.theme-light {
            --primary-color: #ff6b35;
            --secondary-color: #004e89;
            --danger-color: #d32f2f;
            --bg-primary: linear-gradient(135deg, #ffffff 0%, #f5f5f5 50%, #eeeeee 100%);
            --bg-secondary: rgba(0, 78, 137, 0.05);
            --text-primary: #212121;
            --text-secondary: #757575;
            --card-glow: rgba(255, 107, 53, 0.25);
            --accent-glow: rgba(0, 78, 137, 0.15);
        }

        /* Theme Selector Button */
        .theme-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            background: var(--primary-color);
            color: var(--text-primary);
            border: none;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            z-index: 900;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .theme-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--card-glow);
        }

        /* Theme Dropdown */
        .theme-dropdown {
            position: fixed;
            top: 75px;
            right: 30px;
            background: var(--bg-secondary);
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            z-index: 899;
            display: none;
            flex-direction: column;
            gap: 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-height: 500px;
            overflow-y: auto;
            min-width: 280px;
            animation: slideDown 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .theme-dropdown.active {
            display: flex;
        }

        .theme-dropdown-item {
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid var(--primary-color);
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
            position: relative;
        }

        .theme-dropdown-item:last-child {
            border-bottom: none;
        }

        .theme-dropdown-item:hover {
            background: var(--primary-color);
            opacity: 0.2;
            padding-left: 20px;
        }

        .theme-dropdown-item.active {
            background: var(--primary-color);
            opacity: 0.25;
            font-weight: 600;
        }

        .theme-dropdown-item.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .theme-dropdown-item.locked:hover {
            background: transparent;
            opacity: 0.5;
            padding-left: 16px;
        }

        .theme-color-preview {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: 2px solid var(--primary-color);
            flex-shrink: 0;
        }

        .theme-dropdown-label {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .theme-dropdown-name {
            font-weight: 600;
            font-size: 0.95em;
        }

        .theme-dropdown-status {
            font-size: 0.75em;
            color: var(--text-secondary);
        }

        .theme-lock-icon {
            font-size: 0.8em;
        }

        @media (max-width: 768px) {
            .theme-btn {
                top: 15px;
                right: 15px;
                padding: 10px 14px;
                font-size: 0.9em;
            }

            .theme-dropdown {
                top: 60px;
                right: 15px;
                min-width: 250px;
            }

            .theme-dropdown-item {
                padding: 12px 14px;
            }

            .theme-color-preview {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Theme Selector Button -->
    <button class="theme-btn" onclick="openThemeSelector()">🎨 Themes</button>

    <div class="container">
        <header>
            <h1>🔴 Pokémon Pack Counter 🔴</h1>
            <p style="color: #ffd700; font-size: 1.1em;">Track your pack openings</p>
        </header>

        <div class="total-counter">
            <h2>Total Packs Opened</h2>
            <div class="number" id="totalCount">0</div>
            <div id="topSet" style="font-size: 1.1em; color: #ffd700; margin-top: 12px; font-weight: 600;"></div>
        </div>

        <div class="controls">
            <div class="input-group">
                <div style="flex: 1; position: relative;">
                    <input 
                        type="text" 
                        id="setName" 
                        placeholder="Search sets (e.g., Scarlet, Base Set)"
                        autocomplete="off"
                        oninput="searchSets()"
                    >
                    <div id="suggestionsDropdown" class="suggestions-dropdown"></div>
                </div>
                <button class="btn btn-primary" onclick="addSet()" style="flex: 0 0 auto;">+ Add</button>
            </div>
            <div class="controls-row">
                <button class="btn btn-secondary" onclick="resetAll()">Reset All</button>
                <button class="btn btn-primary" onclick="openLeaderboard()">🏆 Leaderboard</button>
            </div>
        </div>

        <div class="sets-container" id="setsContainer">
            <div class="empty-state">
                <p>🎁 No sets yet! Add your first set to get started.</p>
            </div>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboardModal" class="modal" onclick="if(event.target.id === 'leaderboardModal') closeLeaderboard()">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🏆 Leaderboard</h2>
                <button class="close-btn" onclick="closeLeaderboard()">×</button>
            </div>

            <div class="modal-tabs">
                <button class="modal-tab-btn active" onclick="switchTab(event, 'leaderboard')">Leaderboard</button>
                <button class="modal-tab-btn" onclick="switchTab(event, 'share')">Share Stats</button>
            </div>

            <!-- Leaderboard Tab -->
            <div id="leaderboardTab" class="modal-tab active">
                <div class="add-friend-form">
                    <input type="text" id="friendShareCode" placeholder="Paste friend's share code or name">
                    <button class="btn btn-primary" onclick="addFriend()" style="flex: 0 0 auto; padding: 12px 20px;">Add</button>
                </div>
                <div id="leaderboardList" class="leaderboard-list"></div>
            </div>

            <!-- Share Stats Tab -->
            <div id="shareTab" class="modal-tab">
                <p style="color: rgba(255, 215, 0, 0.8); margin-bottom: 15px; text-align: center;">Share your stats with friends!</p>
                <div class="share-stats-form">
                    <input type="text" id="shareLink" readonly placeholder="Your share link will appear here">
                    <button class="copy-btn" onclick="copyShareLink(event)">Copy</button>
                </div>
                <p style="color: rgba(255, 215, 0, 0.6); font-size: 0.9em; text-align: center;">Share this link with friends to let them add you to their leaderboard.</p>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'pokemonSets';
        const TCG_API = 'https://api.pokemontcg.io/v2/sets';
        let allSets = [];
        let debounceTimer;

        // Validate image URL
        function isValidImageUrl(url) {
            if (!url || typeof url !== 'string') return false;
            return url.startsWith('http');
        }

        // Fetch all Pokemon sets from TCG API
        async function fetchPokemons() {
            try {
                const response = await fetch(TCG_API);
                const data = await response.json();
                // Filter only valid sets with images
                allSets = (data.data || []).filter(set => 
                    set.images && 
                    set.images.logo && 
                    isValidImageUrl(set.images.logo) &&
                    set.name && 
                    set.printedTotal !== undefined
                );
            } catch (error) {
                console.log('TCG API unavailable, using local mode');
                allSets = [];
            }
        }

        // Search for sets as user types
        function searchSets() {
            clearTimeout(debounceTimer);
            
            debounceTimer = setTimeout(() => {
                const query = document.getElementById('setName').value.toLowerCase().trim();
                const dropdown = document.getElementById('suggestionsDropdown');

                if (!query || query.length < 2) {
                    dropdown.classList.remove('active');
                    return;
                }

                // Filter sets - only match if set name starts with the query (more strict)
                const filtered = allSets.filter(set => {
                    const name = set.name.toLowerCase();
                    const series = (set.series || '').toLowerCase();
                    
                    return (name.startsWith(query) || series.startsWith(query)) &&
                           set.images && 
                           set.images.logo &&
                           isValidImageUrl(set.images.logo);
                }).slice(0, 8); // Show top 8 results

                if (filtered.length === 0) {
                    dropdown.classList.remove('active');
                    return;
                }

                // Render suggestions
                dropdown.innerHTML = filtered.map(set => `
                    <div class="suggestion-item" data-name="${set.name}" data-logo="${set.images.logo}">
                        <img src="${set.images.logo}" alt="${set.name}" onerror="this.style.display='none'" style="display: block;">
                        <div class="suggestion-text">
                            <div>${set.name}</div>
                            <div class="suggestion-code">${set.id} • ${set.total} cards</div>
                        </div>
                    </div>
                `).join('');

                dropdown.classList.add('active');
            }, 200); // 200ms debounce delay
        }

        // Select a set from suggestions
        function selectSet(name, logoUrl) {
            document.getElementById('setName').value = name;
            document.getElementById('suggestionsDropdown').classList.remove('active');
            
            // Store the logo URL for this set
            const sets = loadSets();
            if (!sets[name]) {
                sets[name] = { count: 0, image: logoUrl };
                saveSets(sets);
                render();
            }
        }

        // Handle suggestion item clicks with event delegation
        document.addEventListener('click', (e) => {
            const item = e.target.closest('.suggestion-item');
            if (item && document.getElementById('suggestionsDropdown').contains(item)) {
                const name = item.dataset.name;
                const logo = item.dataset.logo;
                selectSet(name, logo);
            }
        });

        // Load sets from localStorage
        function loadSets() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) return {};
            
            const parsed = JSON.parse(saved);
            // Handle both old format (number) and new format (object)
            const converted = {};
            Object.entries(parsed).forEach(([name, value]) => {
                if (typeof value === 'number') {
                    converted[name] = { count: value, image: null };
                } else {
                    converted[name] = value;
                }
            });
            return converted;
        }

        // Save sets to localStorage
        function saveSets(sets) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sets));
        }

        // Render all sets
        function render() {
            const sets = loadSets();
            const container = document.getElementById('setsContainer');
            
            // Update total
            const total = Object.values(sets).reduce((sum, item) => sum + (item.count || 0), 0);
            document.getElementById('totalCount').textContent = total;
            
            // Update top set (favorite)
            const stats = getStats();
            const topSetElement = document.getElementById('topSet');
            if (stats.mostOpenedSet !== 'None' && total > 0) {
                topSetElement.textContent = `🏆 Favorite: ${stats.mostOpenedSet}`;
            } else {
                topSetElement.textContent = '';
            }

            // Clear container
            container.innerHTML = '';

            // Check if empty
            if (Object.keys(sets).length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>🎁 No sets yet! Search and add your first set to get started.</p></div>';
                return;
            }

            // Render each set
            Object.entries(sets).forEach(([setName, setData]) => {
                const count = setData.count || 0;
                const image = setData.image;
                
                const card = document.createElement('div');
                card.className = 'set-card new';
                card.dataset.setName = setName;
                
                let imageHTML = `<div class="set-image-placeholder">🎴</div>`;
                
                if (image) {
                    imageHTML = `<img src="${image}" alt="${setName}" class="set-image" onerror="this.parentElement.innerHTML='<div class=\\'set-image-placeholder\\'>🎴</div>'">`;
                }
                
                card.innerHTML = `
                    <div class="set-image-container">${imageHTML}</div>
                    <div class="set-name">${setName}</div>
                    <div class="set-count">${count}</div>
                    <div class="set-actions">
                        <button class="btn-increment" onclick="incrementSet('${setName.replace(/'/g, "\\'")}')">➕</button>
                        <button class="btn-decrement" onclick="decrementSet('${setName.replace(/'/g, "\\'")}')">➖</button>
                    </div>
                    <div class="set-actions-secondary">
                        <button class="btn-delete" onclick="deleteSet('${setName.replace(/'/g, "\\'")}')">Remove Set</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Add a new set
        function addSet() {
            const input = document.getElementById('setName');
            const name = input.value.trim();

            if (!name) {
                alert('Please enter or select a set name');
                return;
            }

            const sets = loadSets();
            if (sets[name] !== undefined) {
                alert('This set already exists!');
                return;
            }

            // Find matching set from API for image
            const matchedSet = allSets.find(s => s.name.toLowerCase() === name.toLowerCase());
            const image = matchedSet?.images?.logo || null;

            sets[name] = { count: 0, image: image };
            saveSets(sets);
            input.value = '';
            document.getElementById('suggestionsDropdown').classList.remove('active');
            render();
        }

        // Increment pack count for a set
        function incrementSet(setName) {
            const sets = loadSets();
            if (sets[setName] !== undefined) {
                // Update count
                sets[setName].count = (sets[setName].count || 0) + 1;
                saveSets(sets);
                
                // Find the card element
                const card = document.querySelector(`[data-set-name="${setName}"]`);
                if (card) {
                    // Update total count
                    const total = Object.values(sets).reduce((sum, item) => sum + (item.count || 0), 0);
                    document.getElementById('totalCount').textContent = total;
                    
                    // Update top set (favorite)
                    const stats = getStats();
                    const topSetElement = document.getElementById('topSet');
                    if (stats.mostOpenedSet !== 'None' && total > 0) {
                        topSetElement.textContent = `🏆 Favorite: ${stats.mostOpenedSet}`;
                    } else {
                        topSetElement.textContent = '';
                    }
                    
                    // Update the count display
                    const countElement = card.querySelector('.set-count');
                    countElement.textContent = sets[setName].count;
                    
                    // Trigger smooth animation (only count, no full card)
                    countElement.classList.remove('counting');
                    void countElement.offsetWidth; // Force reflow to restart animation
                    countElement.classList.add('counting');
                    
                    // Card pulse
                    card.classList.remove('pulse');
                    void card.offsetWidth;
                    card.classList.add('pulse');
                    
                    // Add floating "+1" animation
                    const plusOne = document.createElement('div');
                    plusOne.textContent = '+1';
                    plusOne.style.position = 'absolute';
                    plusOne.style.color = '#ffd700';
                    plusOne.style.fontWeight = '900';
                    plusOne.style.zIndex = '10';
                    plusOne.style.pointerEvents = 'none';
                    plusOne.style.fontSize = '1.5em';
                    plusOne.style.top = '20px';
                    plusOne.style.right = '20px';
                    plusOne.style.animation = 'fadeUp 0.6s ease-out';
                    plusOne.style.textShadow = '0 2px 10px rgba(0, 0, 0, 0.5)';
                    
                    card.appendChild(plusOne);
                    setTimeout(() => plusOne.remove(), 600);
                } else {
                    // Card not found, do full render
                    render();
                }
            }
        }

        // Decrement pack count for a set
        function decrementSet(setName) {
            const sets = loadSets();
            if (sets[setName] !== undefined && (sets[setName].count || 0) > 0) {
                sets[setName].count--;
                saveSets(sets);
                
                // Find the card element
                const card = document.querySelector(`[data-set-name="${setName}"]`);
                if (card) {
                    // Update total count
                    const total = Object.values(sets).reduce((sum, item) => sum + (item.count || 0), 0);
                    document.getElementById('totalCount').textContent = total;
                    
                    // Update top set (favorite)
                    const stats = getStats();
                    const topSetElement = document.getElementById('topSet');
                    if (stats.mostOpenedSet !== 'None' && total > 0) {
                        topSetElement.textContent = `🏆 Favorite: ${stats.mostOpenedSet}`;
                    } else {
                        topSetElement.textContent = '';
                    }
                    
                    // Update the count display
                    const countElement = card.querySelector('.set-count');
                    countElement.textContent = sets[setName].count;
                    
                    // Trigger animation
                    countElement.classList.remove('counting');
                    void countElement.offsetWidth;
                    countElement.classList.add('counting');
                    
                    // Card pulse
                    card.classList.remove('pulse');
                    void card.offsetWidth;
                    card.classList.add('pulse');
                } else {
                    render();
                }
            }
        }

        // Delete a set
        function deleteSet(setName) {
            if (confirm(`Delete "${setName}" and all its data?`)) {
                const sets = loadSets();
                delete sets[setName];
                saveSets(sets);
                render();
            }
        }

        // Reset all sets to 0
        function resetAll() {
            if (confirm('Reset all pack counts to 0?')) {
                const sets = loadSets();
                Object.keys(sets).forEach(setName => {
                    sets[setName].count = 0;
                });
                saveSets(sets);
                render();
            }
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (e.target.id !== 'setName') {
                document.getElementById('suggestionsDropdown').classList.remove('active');
            }
        });

        // Allow Enter key to add set
        document.getElementById('setName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addSet();
        });

        // ===== LEADERBOARD & SHARING FUNCTIONS =====
        
        const FRIENDS_KEY = 'pokemonFriends';
        const USER_ID_KEY = 'pokemonUserId';

        // Generate unique user ID
        function getOrCreateUserId() {
            let userId = localStorage.getItem(USER_ID_KEY);
            if (!userId) {
                userId = 'user_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem(USER_ID_KEY, userId);
            }
            return userId;
        }

        // Get user name (can be customized)
        function getUserName() {
            return localStorage.getItem('pokemonUserName') || 'You';
        }

        // Load friends from localStorage
        function loadFriends() {
            const saved = localStorage.getItem(FRIENDS_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        // Save friends to localStorage
        function saveFriends(friends) {
            localStorage.setItem(FRIENDS_KEY, JSON.stringify(friends));
        }

        // Generate shareable link
        function generateShareLink() {
            const userId = getOrCreateUserId();
            const baseUrl = window.location.origin + window.location.pathname;
            return baseUrl + '?friend=' + userId;
        }

        // Get stats for leaderboard
        function getStats(friendData = null) {
            if (friendData) {
                return friendData.stats;
            }
            const sets = loadSets();
            const total = Object.values(sets).reduce((sum, item) => sum + (item.count || 0), 0);
            return {
                total: total,
                setCount: Object.keys(sets).length,
                mostOpenedSet: Object.entries(sets).sort((a, b) => (b[1].count || 0) - (a[1].count || 0))[0]?.[0] || 'None'
            };
        }

        // Add friend to leaderboard
        function addFriend() {
            const input = document.getElementById('friendShareCode').value.trim();
            if (!input) {
                alert('Please enter a friend code or name');
                return;
            }

            const friends = loadFriends();
            
            // Check if already added
            if (friends.some(f => f.id === input || f.name === input)) {
                alert('This friend is already on your leaderboard!');
                return;
            }

            // Add friend
            friends.push({
                id: input,
                name: input,
                stats: { total: 0, setCount: 0 },
                dateAdded: new Date().toISOString()
            });

            saveFriends(friends);
            document.getElementById('friendShareCode').value = '';
            renderLeaderboard();
        }

        // Remove friend from leaderboard
        function removeFriend(friendId) {
            if (confirm('Remove this friend from your leaderboard?')) {
                let friends = loadFriends();
                friends = friends.filter(f => f.id !== friendId);
                saveFriends(friends);
                renderLeaderboard();
            }
        }

        // Render leaderboard
        function renderLeaderboard() {
            const friends = loadFriends();
            const container = document.getElementById('leaderboardList');
            const userId = getOrCreateUserId();

            // Get your stats
            const yourStats = getStats();
            const leaderboard = [
                {
                    id: userId,
                    name: getUserName(),
                    stats: yourStats,
                    isYou: true
                },
                ...friends.map(f => ({
                    ...f,
                    isYou: false
                }))
            ];

            // Sort by total packs
            leaderboard.sort((a, b) => (b.stats.total || 0) - (a.stats.total || 0));

            if (leaderboard.length === 1) {
                container.innerHTML = '<div class="empty-leaderboard">Invite a friend to start competing! 🎉</div>';
                return;
            }

            container.innerHTML = leaderboard.map((person, index) => {
                let medal = '👤';
                if (index === 0) medal = '🥇';
                else if (index === 1) medal = '🥈';
                else if (index === 2) medal = '🥉';

                const rankClass = index === 0 ? 'first' : index === 1 ? 'second' : index === 2 ? 'third' : '';

                return `
                    <div class="leaderboard-item">
                        <div class="leaderboard-rank ${rankClass}">${medal}</div>
                        <div class="leaderboard-info">
                            <div class="leaderboard-name">${person.name}${person.isYou ? ' (You)' : ''}</div>
                            <div class="leaderboard-count">${person.stats.setCount || 0} sets tracked</div>
                        </div>
                        <div class="leaderboard-packs">${person.stats.total || 0}</div>
                        ${!person.isYou ? `<button class="btn-delete" onclick="removeFriend('${person.id}')">✕</button>` : ''}
                    </div>
                `;
            }).join('');
        }

        // Copy share link
        function copyShareLink(event) {
            const shareLink = generateShareLink();
            document.getElementById('shareLink').value = shareLink;
            
            navigator.clipboard.writeText(shareLink).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = 'Copied! ✓';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(() => {
                alert('Copy failed. Link: ' + shareLink);
            });
        }

        // Open leaderboard modal
        function openLeaderboard() {
            document.getElementById('leaderboardModal').classList.add('active');
            document.getElementById('shareLink').value = generateShareLink();
            renderLeaderboard();
        }

        // Close leaderboard modal
        function closeLeaderboard() {
            document.getElementById('leaderboardModal').classList.remove('active');
        }

        // Switch tabs in modal
        function switchTab(event, tabName) {
            // Hide all tabs
            document.querySelectorAll('.modal-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.modal-tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + 'Tab').classList.add('active');
            event.target.classList.add('active');
        }

        // Check URL for friend share code
        function checkFriendShare() {
            const params = new URLSearchParams(window.location.search);
            const friendCode = params.get('friend');
            if (friendCode) {
                const friends = loadFriends();
                if (!friends.some(f => f.id === friendCode)) {
                    friends.push({
                        id: friendCode,
                        name: friendCode,
                        stats: { total: 0, setCount: 0 },
                        dateAdded: new Date().toISOString()
                    });
                    saveFriends(friends);
                    alert('Friend added to your leaderboard! 🎉');
                }
                // Clean URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        // Initialize
        checkFriendShare();
        fetchPokemons().then(() => render());

        // ============ THEME SYSTEM ============
        const THEMES = [
            {
                id: 'theme-dark',
                name: '🌙 Dark Mode',
                class: 'theme-dark',
                unlockAt: 0,
                free: true,
                colors: ['#ffd700', '#ff6b35']
            },
            {
                id: 'theme-retro-8bit',
                name: '👾 Retro 8-bit',
                class: 'theme-retro-8bit',
                unlockAt: 50,
                free: false,
                colors: ['#ff00ff', '#00ffff']
            },
            {
                id: 'theme-neon-cyber',
                name: '⚡ Neon Cyber',
                class: 'theme-neon-cyber',
                unlockAt: 0,
                free: true,
                colors: ['#00ff00', '#ff00ff']
            },
            {
                id: 'theme-gold-silver',
                name: '✨ Gold & Silver',
                class: 'theme-gold-silver',
                unlockAt: 100,
                free: false,
                colors: ['#ffd700', '#c0c0c0']
            },
            {
                id: 'theme-pastel-nature',
                name: '🌸 Pastel Nature',
                class: 'theme-pastel-nature',
                unlockAt: 150,
                free: false,
                colors: ['#85e7c9', '#ffa6c1']
            },
            {
                id: 'theme-light',
                name: '☀️ Light Mode',
                class: 'theme-light',
                unlockAt: 0,
                free: true,
                colors: ['#ff6b35', '#004e89']
            }
        ];

        function getThemeStorage() {
            return localStorage.getItem('pokemonTheme') || 'theme-dark';
        }

        function setThemeStorage(themeId) {
            localStorage.setItem('pokemonTheme', themeId);
        }

        function applyTheme(themeId) {
            // Remove all theme classes
            document.body.classList.remove(...THEMES.map(t => t.class));
            
            // Add the new theme class
            const theme = THEMES.find(t => t.id === themeId);
            if (theme) {
                document.body.classList.add(theme.class);
                setThemeStorage(themeId);
            }
        }

        function isThemeUnlocked(unlockAt, free) {
            if (free) return true;
            const sets = loadSets();
            const total = Object.values(sets).reduce((sum, item) => sum + (item.count || 0), 0);
            return total >= unlockAt;
        }

        function renderThemeSelector() {
            const dropdown = document.getElementById('themeDropdown');
            if (!dropdown) return;
            
            const sets = loadSets();
            const totalPacks = Object.values(sets).reduce((sum, item) => sum + (item.count || 0), 0);
            const currentTheme = getThemeStorage();

            dropdown.innerHTML = THEMES.map(theme => {
                const isUnlocked = isThemeUnlocked(theme.unlockAt, theme.free);
                const isActive = currentTheme === theme.id;
                
                let statusText = isUnlocked ? '✅ Unlocked' : `🔒 ${theme.unlockAt - totalPacks} packs to unlock`;

                return `
                    <div class="theme-dropdown-item ${isActive ? 'active' : ''} ${!isUnlocked ? 'locked' : ''}" 
                         onclick="${isUnlocked ? `selectTheme('${theme.id}')` : 'return false;'}"
                         style="--primary-color: ${theme.colors[0]};">
                        <div class="theme-color-preview" style="background: linear-gradient(135deg, ${theme.colors[0]} 0%, ${theme.colors[1]} 100%);"></div>
                        <div class="theme-dropdown-label">
                            <div class="theme-dropdown-name">${theme.name}</div>
                            <div class="theme-dropdown-status">${statusText}</div>
                        </div>
                        ${isActive ? '<div style="font-size: 1.2em;">✓</div>' : ''}
                    </div>
                `;
            }).join('');
        }

        function openThemeSelector() {
            renderThemeSelector();
            const dropdown = document.getElementById('themeDropdown');
            if (dropdown) {
                dropdown.classList.toggle('active');
            }
        }

        function closeThemeSelector() {
            const dropdown = document.getElementById('themeDropdown');
            if (dropdown) {
                dropdown.classList.remove('active');
            }
        }

        function selectTheme(themeId) {
            const theme = THEMES.find(t => t.id === themeId);
            if (theme && isThemeUnlocked(theme.unlockAt, theme.free)) {
                applyTheme(themeId);
                renderThemeSelector();
            }
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('themeDropdown');
            const themeBtn = document.querySelector('.theme-btn');
            
            if (dropdown && themeBtn && !themeBtn.contains(e.target) && !dropdown.contains(e.target)) {
                closeThemeSelector();
            }
        });

        // Apply theme on page load
        applyTheme(getThemeStorage());
        
        // Initialize theme dropdown after a short delay to ensure DOM is ready
        setTimeout(() => {
            renderThemeSelector();
        }, 100);
    </script>

    <!-- Theme Dropdown -->
    <div id="themeDropdown" class="theme-dropdown"></div>

</body>
</html>
