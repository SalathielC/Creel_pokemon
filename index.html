<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Pack Counter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ff1919 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 2px 4px rgba(255, 215, 0, 0.3);
            font-weight: 700;
            letter-spacing: 2px;
        }

        .total-counter {
            background: linear-gradient(135deg, #ff1919 0%, #ffd700 100%);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.3), 0 0 20px rgba(255, 25, 25, 0.2);
            animation: slideUp 0.8s ease-out;
        }

        .total-counter h2 {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #000;
        }

        .total-counter .number {
            font-size: 4em;
            font-weight: 700;
            color: #000;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 1s ease-out;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #000;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ff1919 0%, #cc0000 100%);
            color: #fff;
            box-shadow: 0 5px 15px rgba(255, 25, 25, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 25, 25, 0.6);
        }

        .sets-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .set-card {
            background: linear-gradient(135deg, #2d2d44 0%, #3d3d5c 100%);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 2px solid #4a4a6a;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out;
        }

        .set-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
        }

        .set-name {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .set-count {
            font-size: 3.5em;
            font-weight: 700;
            text-align: center;
            margin: 20px 0;
            color: #fff;
            background: rgba(255, 215, 0, 0.1);
            padding: 20px;
            border-radius: 10px;
        }

        .set-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-increment,
        .btn-decrement,
        .btn-delete {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.2em;
            transition: all 0.3s ease;
        }

        .btn-increment {
            background: linear-gradient(135deg, #04d361 0%, #00c94f 100%);
            color: #fff;
        }

        .btn-increment:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(4, 211, 97, 0.4);
        }

        .btn-decrement {
            background: linear-gradient(135deg, #ff1919 0%, #cc0000 100%);
            color: #fff;
        }

        .btn-decrement:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 25, 25, 0.4);
        }

        .btn-delete {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: #fff;
            padding: 8px;
            font-size: 0.9em;
        }

        .btn-delete:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4);
        }

        .set-actions-secondary {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #4a4a6a;
            border-radius: 10px;
            background: #2d2d44;
            color: #fff;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .total-counter .number {
                font-size: 2.5em;
            }

            .sets-container {
                grid-template-columns: 1fr;
            }

            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔴 Pokémon Pack Counter 🔴</h1>
            <p style="color: #ffd700; font-size: 1.1em;">Track your pack openings</p>
        </header>

        <div class="total-counter">
            <h2>Total Packs Opened</h2>
            <div class="number" id="totalCount">0</div>
        </div>

        <div class="controls">
            <div class="input-group">
                <input 
                    type="text" 
                    id="setName" 
                    placeholder="Enter set name (e.g., Scarlet & Violet, Base Set)"
                    autocomplete="off"
                >
                <button class="btn btn-primary" onclick="addSet()">+ Add Set</button>
            </div>
            <button class="btn btn-secondary" onclick="resetAll()">Reset All</button>
        </div>

        <div class="sets-container" id="setsContainer">
            <div class="empty-state">
                <p>🎁 No sets yet! Add your first set to get started.</p>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'pokemonSets';

        // Load sets from localStorage
        function loadSets() {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : {};
        }

        // Save sets to localStorage
        function saveSets(sets) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sets));
        }

        // Render all sets
        function render() {
            const sets = loadSets();
            const container = document.getElementById('setsContainer');
            
            // Update total
            const total = Object.values(sets).reduce((sum, count) => sum + count, 0);
            document.getElementById('totalCount').textContent = total;

            // Clear container
            container.innerHTML = '';

            // Check if empty
            if (Object.keys(sets).length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>🎁 No sets yet! Add your first set to get started.</p></div>';
                return;
            }

            // Render each set
            Object.entries(sets).forEach(([setName, count]) => {
                const card = document.createElement('div');
                card.className = 'set-card';
                card.innerHTML = `
                    <div class="set-name">${setName}</div>
                    <div class="set-count">${count}</div>
                    <div class="set-actions">
                        <button class="btn-increment" onclick="incrementSet('${setName}')">➕</button>
                        <button class="btn-decrement" onclick="decrementSet('${setName}')">➖</button>
                    </div>
                    <div class="set-actions-secondary">
                        <button class="btn-delete" onclick="deleteSet('${setName}')">Remove Set</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Add a new set
        function addSet() {
            const input = document.getElementById('setName');
            const name = input.value.trim();

            if (!name) {
                alert('Please enter a set name');
                return;
            }

            const sets = loadSets();
            if (sets[name] !== undefined) {
                alert('This set already exists!');
                return;
            }

            sets[name] = 0;
            saveSets(sets);
            input.value = '';
            render();
        }

        // Increment pack count for a set
        function incrementSet(setName) {
            const sets = loadSets();
            if (sets[setName] !== undefined) {
                sets[setName]++;
                saveSets(sets);
                render();
            }
        }

        // Decrement pack count for a set
        function decrementSet(setName) {
            const sets = loadSets();
            if (sets[setName] !== undefined && sets[setName] > 0) {
                sets[setName]--;
                saveSets(sets);
                render();
            }
        }

        // Delete a set
        function deleteSet(setName) {
            if (confirm(`Delete "${setName}" and all its data?`)) {
                const sets = loadSets();
                delete sets[setName];
                saveSets(sets);
                render();
            }
        }

        // Reset all sets to 0
        function resetAll() {
            if (confirm('Reset all pack counts to 0?')) {
                Object.keys(loadSets()).forEach(setName => {
                    const sets = loadSets();
                    sets[setName] = 0;
                    saveSets(sets);
                });
                render();
            }
        }

        // Allow Enter key to add set
        document.getElementById('setName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addSet();
        });

        // Initial render
        render();
    </script>
</body>
</html>
